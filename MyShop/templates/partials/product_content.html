<section class="mx-auto max-w-6xl px-4 py-16">
  <h1 class="text-3xl font-bold tracking-tight">Products</h1>

  <div class="mt-8 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
    {% for product in products %}
      <article class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
        <p class="text-xs font-medium uppercase tracking-wide text-slate-500">
          {{ product.sku_id }}
        </p>
          {% if product.image %}
        <img src="{{ product.image.url }}" alt="{{ product.product_name }}">
          {% endif %}
        <h2 class="mt-2 text-lg font-semibold text-slate-900">
          {{ product.product_name }}
        </h2>

        <p class="mt-2 text-sm text-slate-600">
          {{ product.description }}
        </p>

        <div class="mt-5 flex items-center justify-between">
          <span class="text-lg font-bold text-slate-900">
            ${{ product.price }}
          </span>

          <span class="rounded-full bg-slate-100 px-3 py-1 text-xs text-slate-600">
            {{ product.availability }} available
          </span>
        </div>
      </article>
    {% empty %}
      <p class="text-slate-600">No products available yet.</p>
    {% endfor %}
  </div>
</section>

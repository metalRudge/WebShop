<header class="sticky top-0 z-40 border-b border-slate-200 bg-white/80 backdrop-blur supports-[backdrop-filter]:bg-white/70">
  <nav class="mx-auto flex max-w-6xl items-center gap-4 px-4 py-3 sm:px-6 lg:px-8" aria-label="Primary">

    <a href="/" class="flex items-center gap-2 text-base font-semibold tracking-tight text-slate-900">
      <span class="inline-flex h-7 w-7 items-center justify-center rounded-md bg-slate-900 text-xs font-bold text-white">W</span>
      <span>Webshop</span>
    </a>

    <ul class="ml-6 hidden items-center gap-6 text-sm font-medium text-slate-600 md:flex">
      <li>
        <a href="{% url 'products' %}" class="transition hover:text-slate-900">Products</a>
      </li>

      {# Categories dropdown #}
      <li class="relative" x-data="{ open: false }">
        <button @click="open = !open" @keydown.escape="open = false" class="flex items-center gap-1 transition hover:text-slate-900">
          Categories
          <svg class="h-3.5 w-3.5 transition-transform" :class="{ 'rotate-180': open }" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </button>

        <ul x-show="open" @click.outside="open = false"
            x-transition:enter="transition ease-out duration-100"
            x-transition:enter-start="opacity-0 scale-95"
            x-transition:enter-end="opacity-100 scale-100"
            x-transition:leave="transition ease-in duration-75"
            x-transition:leave-start="opacity-100 scale-100"
            x-transition:leave-end="opacity-0 scale-95"
            class="absolute left-0 top-full mt-1 w-44 rounded-xl border border-slate-100 bg-white py-1.5 shadow-lg z-50"
            style="display:none">
          <li>
            <a href="{% url 'products' %}" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 hover:text-slate-900">All products</a>
          </li>
          {% for cat in nav_categories %}
          <li>
            <a href="{% url 'products' %}?category={{ cat }}" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 hover:text-slate-900">{{ cat }}</a>
          </li>
          {% endfor %}
        </ul>
      </li>
    </ul>

    <form action="{% url 'search' %}" method="get" role="search" class="ml-auto hidden flex-1 max-w-xs sm:block">
      <label class="sr-only" for="site-search">Search products</label>
      <div class="relative">
        <input id="site-search" name="q" type="search" placeholder="Search products…"
               class="w-full rounded-md border border-slate-300 bg-white py-1.5 pl-9 pr-3 text-sm text-slate-900 placeholder:text-slate-400 focus:border-slate-900 focus:outline-none focus:ring-1 focus:ring-slate-900">
      </div>
    </form>

    <div class="ml-auto flex items-center gap-2 sm:ml-4">
      <a href="{% url 'cart' %}" class="relative inline-flex items-center gap-1.5 rounded-md px-2.5 py-1.5 text-sm font-medium text-slate-700 transition hover:bg-slate-100 hover:text-slate-900">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 2m2-2h10m0 0l2 2m-2-2v6a1 1 0 01-1 1H8a1 1 0 01-1-1v-6" />
        </svg>
        Cart
        <span id="cart-badge" class="inline-flex items-center justify-center rounded-full bg-indigo-600 px-1.5 py-0.5 text-xs font-semibold text-white min-w-[1.25rem] {% if not meta.cart_count %}hidden{% endif %}">
          {{ meta.cart_count }}
        </span>
      </a>

      {% if user.is_authenticated %}
        <a href="{% url 'account' %}" class="hidden rounded-md px-3 py-1.5 text-sm font-medium text-slate-700 transition hover:bg-slate-100 hover:text-slate-900 sm:inline-flex">{{ user.username }}</a>

        <form method="post" action="{% url 'logout' %}" class="hidden sm:block">
          {% csrf_token %}
          <button type="submit" class="rounded-md border border-slate-300 px-3 py-1.5 text-sm font-medium text-slate-700 transition hover:border-slate-400 hover:text-slate-900">Logout</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}" class="hidden rounded-md border border-slate-300 px-3 py-1.5 text-sm font-medium text-slate-700 transition hover:border-slate-400 hover:text-slate-900 sm:inline-block">Login</a>
        <a href="/admin/" class="inline-flex items-center rounded-md bg-slate-900 px-3 py-1.5 text-sm font-medium text-white transition hover:bg-slate-700">Admin</a>
      {% endif %}
    </div>

  </nav>
</header>

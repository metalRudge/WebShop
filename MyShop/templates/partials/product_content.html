  <a href="{% url 'product_detail' product.sku_id %}"
    class="group block bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow duration-200">
  <div class="aspect-square bg-gray-100 overflow-hidden">
    {% if product.images_cdn %}
      <img src="{{ product.images_cdn.0 }}?auto=format&fit=crop&w=600&q=80"
           alt="{{ product.product_name }}"
           class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
           loading="lazy">
    {% else %}
      <div class="w-full h-full flex items-center justify-center text-gray-300">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      </div>
    {% endif %}
  </div>

  <div class="p-4">
    <h2 class="text-sm font-medium text-gray-900 truncate">{{ product.product_name }}</h2>
    <p class="text-xs text-gray-500 mt-1 truncate">{{ product.description }}</p>
    <div class="flex items-center justify-between mt-3">
      <span class="text-base font-semibold text-gray-900">${{ product.price }}</span>
      {% if not product.availability %}
        <span class="text-xs text-red-500 font-medium">Out of stock</span>
      {% endif %}
    </div>
  </div>
</a>

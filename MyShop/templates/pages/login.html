{% extends "base.html" %}

{% block title %}Login | WebShop{% endblock %}

{% block content %}
<section class="min-h-[70vh] flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md bg-white border border-slate-200 rounded-2xl shadow-sm p-8">

    <h1 class="text-2xl font-bold text-slate-800 mb-1">Welcome back</h1>
    <p class="text-sm text-slate-500 mb-6">Sign in to your WebShop account</p>

    {% if error %}
    <div class="flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 rounded-xl p-4 mb-6">
      <i data-lucide="circle-alert" class="w-4 h-4 shrink-0"></i>
      <p class="text-sm">{{ error }}</p>
    </div>
    {% endif %}

    <form method="POST" action="{% url 'login' %}" class="space-y-5">
      {% csrf_token %}

      <div>
        <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
        <input type="text" id="username" name="username" required autofocus
          placeholder="Your username"
          class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition">
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input type="password" id="password" name="password" required
          placeholder="••••••••"
          class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition">
      </div>

      <button type="submit"
        class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-2.5 rounded-lg transition">
        Sign In
      </button>
    </form>

    <p class="text-sm text-slate-500 text-center mt-6">
      Don't have an account?
      <a href="{% url 'register' %}" class="text-teal-600 font-medium hover:underline">Register</a>
    </p>

  </div>
</section>
{% endblock %}

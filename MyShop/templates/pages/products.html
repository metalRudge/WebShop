{% extends "base.html" %}

{% block title %}Products | WebShop{% endblock %}

{% block content %}
<section class="mx-auto max-w-6xl px-4 py-16">
  <h1 class="text-3xl font-bold tracking-tight">Products</h1>
  <div id='product-grid' class="mt-4 text-slate-600 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-y-6 gap-x-8">
    {% for product in products %}
      {% include "partials/product_content.html" with product=product %}
    {% empty %}
      <p class="col-span-full text-center text-slate-400 py-16">No products found.</p>
    {% endfor %}
    
  </div>    
</section>
{% endblock %}
